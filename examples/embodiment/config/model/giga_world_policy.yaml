model_type: "giga_world_policy"

# In RLinf rollout, model_path is treated as the WA transformer checkpoint path.
model_path: "/path/to/wa_transformer_ckpt"

precision: bf16

num_action_chunks: 48
action_dim: 14

is_lora: False
lora_rank: 32

use_proprio: True
num_steps: 1
add_value_head: False

giga_world_policy:
  wa_root: "/path/to/wan-casual-cj"
  base_model_dir: "/path/to/Wan2.2-TI2V-5B-Diffusers"
  norm_json: "/path/to/norm_stats_delta.json"
  diffusers_src: null
  robotype: "aloha"
  num_inference_steps: 10
  guidance_scale: 0.0
  num_frames: 5
  single_view_width: 256
  single_view_height: 192
  prompt: null
  use_safetensors: False

  # route A: keep frozen WA backbone + latent compressor + small RL heads
  use_rl_head_for_rollout: False
  visual_feature_dim: 2048
  bc_coef: 1.0
  ref_action_dropout_p: 0.5
  target_tau: 0.005

  # Debug / ablation knobs for BC-copy diagnosis:
  #   actor_output_mode:
  #     - learned: use the MLP actor head (default)
  #     - hard_copy_ref_action: bypass the MLP and output ref_action directly
  #   *_input_mode (for visual / robot_state / ref_action):
  #     - normal: keep this input branch (default)
  #     - zero: keep the same input shape but replace this branch with zeros
  #     - remove: completely remove this branch from the actor/critic input
  actor_output_mode: "learned"
  visual_input_mode: "normal"
  robot_state_input_mode: "normal"
  ref_action_input_mode: "normal"
  enable_latent_debug: False
  latent_debug_dir: "./results/latent_debug"
