defaults:
  - env/robotwin_place_empty_cup@env.train
  - env/robotwin_place_empty_cup@env.eval
  - model/giga_world_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor, env, rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_eval_giga_world_policy"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1

  only_eval: True
  val_check_interval: 1
  save_interval: 100000

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: False
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: gae
  # Use actor here so validate_cfg does not require actor.model.add_value_head=True
  loss_type: actor
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: False
    temperature_train: 1.0
    temperature_eval: -1
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  # train section still needs valid values because EnvWorker.init_worker reads it
  train:
    total_num_envs: 1
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 192
    max_steps_per_rollout_epoch: 192
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    enable_offload: False
    center_crop: True
    task_config:
      step_lim: 192
      camera:
        collect_head_camera: true
        collect_wrist_camera: true

  eval:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 192
    max_steps_per_rollout_epoch: 192
    group_size: 1
    use_fixed_reset_state_ids: True
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    enable_offload: False
    center_crop: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    task_config:
      step_lim: 192
      camera:
        collect_head_camera: true
        collect_wrist_camera: true

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_type: "giga_world_policy"
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: False

  model:
    model_path: "/shared_disk/users/chaojun.ni/experiments/wa_single_year/pretrain_robotwin/models/checkpoint_epoch_140_step_60340/transformer"
    wan_model_id: "/shared_disk/models/huggingface/models--Wan-AI--Wan2.2-TI2V-5B-Diffusers"
    model_type: "giga_world_policy"
    precision: "bf16"

    value_type: ${algorithm.reward_type}
    action_dim: 14
    use_proprio: True
    proprio_dim: 14
    state_dim: 14
    num_action_chunks: 48
    num_frames: 5
    num_inference_steps: 10
    guidance_scale: 0.0
    max_text_length: 60
    dst_size: [768, 192]
    center_crop: True

    add_value_head: False
    is_lora: False

  optim:
    lr: 1.0e-4
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 10.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
