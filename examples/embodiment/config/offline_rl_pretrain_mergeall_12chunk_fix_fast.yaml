defaults:
  - env/robotwin_place_empty_cup@env.train
  - env/robotwin_place_empty_cup@env.eval
  - model/giga_world_policy@actor.model
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1
  component_placement:
    actor, env, rollout: 0-3

runner:
  task_type: embodied
  logger:
    log_path: "/shared_disk/users/angen.ye/code/world_module_rollout/RLinf/examples/results/offline_rl_pretrain_mergeall_12chunk_fix"
    project_name: rlinf
    experiment_name: "robotwin_train_giga_world_policy"
    logger_backends: ["tensorboard"]

  max_epochs: 2000
  max_steps: -1
  only_eval: False
  val_check_interval: 1
  save_interval: 20

  resume_dir: /shared_disk/users/angen.ye/code/world_module_rollout/RLinf/examples/results/offline_critic_pretrain_mergeall_12chunk_fix2/robotwin_train_giga_world_policy/checkpoints/global_step_1020
  ckpt_path: null
  resume_load_optimizer_and_scheduler_state: false
  per_worker_log_path: null

algorithm:
  replay_buffer:
    enable_cache: True
    cache_size: 2000
    sample_window_size: 6000
    min_buffer_size: 0
    require_for_training: false
    store_online_data: false
    auto_save: False
    auto_save_path: null
    trajectory_format: pt
    enable_preload: False
    prefetch_size: 10

  demo_buffer:
    enable: true
    enable_cache: True
    cache_size: 2000
    sample_window_size: 6000
    min_buffer_size: 32
    train_actor_steps: 32
    auto_save: False
    auto_save_path: null
    trajectory_format: pt
    load_path: /shared_disk/users/angen.ye/code/world_module_rollout/RLinf/examples/results/gigawa_offline_collect4_12chunk_fix/mergeall
    sample_ratio: 1.0
    allow_train_on_demo_only: true
    allow_demo_only_fallback: true
    allow_replay_only_fallback: false
    store_online_interventions: false

  offline_rl_pretrain:
    enable: true
    val_ratio: 0.2
    split_seed: 1234
    quality_mode: reward_max
    success_threshold: 0.5
    steps_per_epoch: 60
    val_steps_per_epoch: 15
    class_eval_steps_per_epoch: 15
    critic_updates_per_step: 2
    actor_updates_per_step: 1

  normalize_advantages: False
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: gae
  loss_type: embodied_gigawa
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.9
  gae_lambda: 0.95

  reward_coef: 1
  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 5.0

  training_stage: full_rl

  update_epoch: 1
  utd_ratio: 1
  critic_actor_ratio: 2
  tau: 0.005
  target_update_freq: 1
  target_policy_noise: 0.0
  target_noise_clip: 0.0
  bc_coef: 1.0
  ref_action_dropout_p: 0.5
  warmup_steps: 0
  train_actor_steps: 0
  rollout_actor_after_warmup: false
  rollout_actor_min_actor_updates: 100000000

  sampling_params:
    do_sample: False
    temperature_train: -1
    temperature_eval: -1
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 512
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 4
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 192
    max_steps_per_rollout_epoch: 192
    group_size: 1
    auto_reset: False
    ignore_terminations: False
    assets_path: "/shared_disk/users/angen.ye/code/world_module_rollout/RoboTwin-main"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/fixed_collect_seed.json
    center_crop: False
    task_config:
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
      use_seed: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1.0
        random_head_camera_dis: 0.0
        random_table_height: 0.0
        random_light: false
        crazy_random_light_rate: 0.0

  eval:
    total_num_envs: 4
    auto_reset: True
    ignore_terminations: False
    max_episode_steps: 192
    reward_coef: ${algorithm.reward_coef}
    max_steps_per_rollout_epoch: 192
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: "/shared_disk/users/angen.ye/code/world_module_rollout/RoboTwin-main"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/fixed_collect_seed.json
    center_crop: False
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval
    task_config:
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
      use_seed: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1.0
        random_head_camera_dis: 0.0
        random_table_height: 0.0
        random_light: false
        crazy_random_light_rate: 0.0        

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 64
  seed: 1234
  enable_offload: False

  critic_optim:
    lr: 3.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    total_training_steps: 200
    lr_warmup_steps: 0
    lr_scheduler: constant
    num_cycles: 0.5
    min_lr: 2.5e-06

  model:
    model_path: "/shared_disk/users/angen.ye/code/world_module_rollout/checkpoints/checkpoint_epoch_2_step_100000/transformer"
    num_action_chunks: 12
    action_dim: 14
    precision: bf16
    giga_world_policy:
      wa_root: "/shared_disk/users/angen.ye/code/world_module_rollout/wan-casual-cj"
      base_model_dir: "/shared_disk/models/huggingface/models--Wan-AI--Wan2.2-TI2V-5B-Diffusers"
      norm_json: "/shared_disk/users/angen.ye/code/world_module_rollout/norm_stats_delta.json"
      diffusers_src: null
      robotype: "aloha"
      num_inference_steps: 10
      guidance_scale: 0.0
      num_frames: 5
      single_view_width: 256
      single_view_height: 192
      prompt: null
      use_safetensors: False
      use_rl_head_for_rollout: False
      visual_feature_dim: 2048
      bc_coef: 1
      ref_action_dropout_p: 0
      target_tau: 0.005
      enable_latent_debug: False
      latent_debug_dir: "${runner.logger.log_path}/latent_debug"
      actor_output_mode: "learned"
      visual_input_mode: "normal"
      robot_state_input_mode: "normal"
      ref_action_input_mode: "normal"
      wa_num_action_chunks: 48

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 200
    lr_warmup_steps: 0
    lr_scheduler: "constant"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: true
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
